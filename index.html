          "«Дело №472791. Джессика Рейн. Статус: закрыто. Причина: несчастный случай».",
          "Он застыл. Пальцы сжались, фонарь задрожал.",
          "Он вспомнил — обещания, взгляды, слова полицейских: «Мы сделаем всё, чтобы найти виновных».",
          "Теперь эти слова звучали как издёвка. Ложь, грязная, пропитанная страхом и продажностью.",
          "Он стоял в тени, а внутри него — гул. Не крик, не ярость — тишина, которая страшнее.",
          "Теперь он знал, за кем пришёл.",
          "Кабинет лейтенанта Ньюмана утопал в полумраке. Настольная лампа горела неровным светом, будто тоже устала от лжи. Воздух был густой, пропитанный табачным дымом и пылью старых дел. Ньюман сидел, привалившись к креслу, не подозревая, что за его спиной уже стоит тот, кто пришёл по его душу.",
          "— Поздно для работы, — раздался голос из тени.",
          "Ньюман вздрогнул. Обернулся. В дверях — фигура. Жёлтая куртка, блестящая от дождя, поверх неё чёрный бронежилет, тёмно-синяя маска с золотыми вставками, в которых отражался свет лампы.",
          "— Кто ты, чёрт возьми?.. — пробормотал он, вставая.",
          "Томас не ответил. Только шагнул ближе. Медленно, как хищник. На стол легло досье — та самая папка.",
          "— Дело № 472791. Джессика Рейн.",
          "Он произнёс имя тихо, но этого было достаточно. Лейтенант побледнел, взгляд забегал.",
          "— Я… я не знаю, кто ты, но… это не моё решение. Приказ сверху. Мы сделали всё возможное…",
          "— Всё возможное? — Томас склонил голову чуть набок. — Ты даже не открыл отчёт, Ньюман. Даже не посмотрел фото. Ты просто подписал.",
          "Ньюман отступил, натыкаясь на стол.",
          "— Слушай парень ты не понимаешь, как это работает… тут всё связано, политики, прокуроры…",
          "Томас приблизился вплотную. Маска отражала его искажённое лицо.",
          "— Она умерла из-за вас. Из-за твоего страха.",
          "Ньюман тяжело дышал, хватаясь за край стола, будто тот мог его спасти.",
          "— Ты не знаешь, что ты делаешь! Это не изменит ничего!",
          "— Я знаю. — Голос Томаса стал почти шёпотом. — Но мне больше не нужно «изменить». Мне нужно, чтобы ты почувствовал.",
          "Рука в перчатке поднялась. Секунда — и лампа упала, погасив свет.",
          "В комнате осталась только тьма и звук дождя за окном.",
          "Шорох, глухой удар, тихий вдох, оборванный на полуслове.",
          "А потом — тишина.",
          "Томас стоял неподвижно. Ни триумфа, ни облегчения. Только пустота. Он смотрел на свои руки — в тусклом отражении окна они казались чужими.",
          "Он вышел в коридор, шаги гулко отдавались по пустому участку.",
          "Когда он прошёл под светом лампы, жёлтая куртка вспыхнула ярким бликом, и будто сама ночь отступила на мгновение.",
          "Но за дверью, в той же тьме, раздался тихий женский голос:",
          "<span class=\"dialog\">— Ты не должен был делать этого...</span>",
          "<span class=\"dialog\">— Ты обещал, что не станешь таким...</span>",
          "Он замер. Голос был мягким, до боли знакомым.",
          "Он обернулся — пустота. Только дождь стучал по стеклу.",
          "Томас снял маску. Глаза — усталые, пустые.",
          "— Прости… — прошептал он, не зная, кому — ей, себе, или тому, кем был.",
          "В отражении окна на мгновение мелькнуло лицо Джесс — светлое, как память.",
          "И исчезло.",
          "Теперь он знал точно: назад дороги нет.",
          "Томас вышел из кабинета, оставляя за спиной пустые глаза Ньюмана, застывшие в полумраке. Коридоры участка казались длиннее обычного, стены — холоднее, а воздух — густым от смешанных запахов бумаги, кофе и старой краски. Он снял маску на мгновение, и в отражении лампочек мелькнуло лицо, которое больше не принадлежало прежнему человеку. Лицо, на котором не осталось ни страха, ни сомнения — только решимость, выточенная болью и потерей.",
          "«Я не могу вернуться», — подумал он, ощущая, как пустота внутри расширяется и становится тяжёлой, как свинец. Внутри всё было вычищено до скелета, оставив только холодный стержень цели. Шаги отдавались эхом по пустым коридорам, но он не дрожал, не боялся — город, казалось, сам держал его в своих тенях.",
          "Джесс… Её голос тихо шептал в памяти: «Ты не должен был это делать». Каждое слово резонировало, как стук по пустой железной бочке, напоминающий о прошлом. Но теперь эти слова не могли остановить его. Они были не запретом, а последним напоминанием о том, что он выбрал свой путь.",
          "Он провёл рукой по холодной стене, ощущая шероховатость краски, и сделал глубокий вдох, ощущая, как сердце бьётся ровно, почти механически. Надев маску снова, он взглянул на дождь за окном: тяжёлые капли разбивались о стекло, отражая огни уличных фонарей. Каждый отблеск казался знаком, указателем, каждое движение тени — шагом к цели.",
          "Он знал: назад дороги нет. Впереди — охота, правда и месть. Впереди — Призрак, готовый пройти через тьму и вынести её с собой.",
          "Ночь висела низко, густая и влажная, словно сама дышала городом. Лужи отражали свет фонарей и неоновых вывесок, превращая улицы в зыбкую, дрожащую поверхность. Томас двигался по крышам, шаги мягкие, но уверенные. Каждое движение было рассчитано, каждый прыжок — тихий и точный. Паркур для него не трюк, а язык воли и наблюдения: он говорил телом, но его глаза собирали информацию.",
          "Противоречие бросалось в глаза.",
          "Он замер на краю крыши, слушая город: гул машин, редкий лай собак, смесь запахов дождя и асфальта. Паркур позволял ему быть невидимым, а разум — внимательным. Томас записывал всё внутренне: кто с кем разговаривает, кто куда идёт, какие слова повторяются, кто оказывается рядом в нужное время. Скрины соц.сетей, публикации новостей, фото — всё это складывалось в карту действий Дэна.",
          "В памяти всплывало лицо Джесс. Он повторял себе: «Не эмоция. Информация». Но память отказывалась подчиняться. Каждое движение Дэна, каждая улыбка на афише, каждый взгляд живого человека — контрастировал с образом на публике. И именно это противоречие говорило: за лицом скрыта правда.",
          "Томас замер, когда Дэн вышел из бара, поднимаясь на улицу. Он проследил взглядом, как тот держался на виду, как выбирал компанию, как избегал некоторых улиц. Каждый шаг, каждый жест фиксировался, складывался в узор. Томас понял: охота только началась, и он готовился не к убийству, а к сбору фактов, к изучению слабостей, к пониманию мотивов.",
          "Ночь была его союзником, дождь — покровом. Томас улыбнулся про себя: «Информация. Всё остальное — лишнее». И в тусклом свете неона глаза Призрака ловили всё: город, людей, ложь и правду.",
          "Ночь лежала тяжёлым покрывалом на городе, а стройплощадка у старого киноздания казалась забытой всеми, кроме ветра и редких капель дождя. Томас замер на крыше соседнего здания, глаза Призрака ловили каждый контур. Дэн спускался по лестнице на территорию, улыбка идеально выстроена для камер, но в руках — лёгкое дрожание, в пальцах — напряжение.",
          "Томас медленно спустился по перекрытиям, скользя по тени. Каждый шаг — контролируемый, без звука. Внутри повторялось правило: не эмоция, только информация. Лицо Джесс всплыло на мгновение в памяти, но он сжал зубы: это не эмоция, это факты.",
          "Он приблизился ближе, к углу здания. Дэн окинул территорию взглядом, не заметив тёмную фигуру, что пряталась в углу. Томас сделал лёгкий шаг, случайно сдвинул маленькую афишу с рекламой концерта — она упала на мокрый асфальт с шорохом.",
          "— Чёрт, кто там? — Дэн дернулся, но вокруг пустота.",
          "Томас сделал ещё один шаг, свет маски отражался в лужах. Он произнёс тихо:",
          "<span class=\"dialog\">— Ты часто здесь появляешься?</span>",
          "Дэн нахмурился, стараясь казаться уверенным.",
          "<span class=\"dialog\">— А ты кто, прохожий? — голос звучал слегка остро. — Следишь за мной?</span>",
          "<span class=\"dialog\">— Интересно наблюдать за городом, — сказал Томас слегка ухмыльнувшись, но при этом его голос был ровный, как сталь. — Особенно за теми, кто на афишах улыбается лучше всех.</span>",
          "Дэн сделал шаг назад, ладони слегка поднялись, глаза бегали по темноте.",
          "<span class=\"dialog\">— Ты псих, что ли? — он усмехнулся, но нервно. — Афиши — это работа, улыбки — часть шоу.</span>",
          "Томас наклонил голову, наблюдая. Противоречие бросалось в глаза: на афишах — идеальная уверенность, в реальности — лёгкая дрожь в пальцах, беглые взгляды по сторонам.",
          "<span class=\"dialog\">— Шоу? — Томас повторил тихо, делая шаг ближе. — А контракты? Давление сверху? Деньги?</span>",
          "Дэн замер, глаза расширились. Он сделал неуверенный жест рукой, словно хотел что-то скрыть, но слова застряли. Томас уловил момент: здесь есть правда, скрытая за фасадом.",
          "<span class=\"dialog\">— Слишком личное, — Дэн отступил ещё шаг, стараясь улыбаться. — Подумаешь, кто-то интересуется…</span>",
          "Томас кивнул. Лёгкий толчок — сдвинул афишу с лица Дэна, которая упала у его ног.",
          "<span class=\"dialog\">— Вот так, — сказал Призрак, голос едва слышно вибрировал. — Смотрите внимательнее, иногда всё видно через мелочи.</span>",
          "Дэн замер, взгляд метался между Томасом и темнотой. Он понимал — кто-то наблюдает, кто-то знает. И это знание было неуловимо опасным.",
          "Томас сделал шаг назад, растворяясь в тени, оставив Дэна с ощущением, что невидимая рука держит его на прицеле. Каждый жест, каждая улыбка, каждый контракт — всё собиралось в карту, а Призрак уже видел слабые места, ниточки, которыми можно будет управлять. И в голове Томаса снова мелькнуло лицо Джесс. Он сжал кулаки под курткой, холодно напоминая себе: не эмоция, только информация.",
          "Наблюдение завершилось. Первые зацепки собраны. Охота только начиналась.",
          "Томас прислонился к стене своего укрытия, желтая куртка лежала на стуле, бронежилет снят, маска — на столе. Ноги устали от бесконечного скольжения по крышам, руки дрожали от концентрации. Внутри него гудела пустота, но тело требовало простого — еды, сна, тепла.",
          "Он достал пакет с едой, скромный ужин: хлеб, немного сыра, бутылка воды. Каждый кусок казался роскошью, вкус — острым напоминанием, что он всё ещё человек. Дождь стучал по крыше, смешиваясь с редкими шумами города, создавая почти уютный ритм. Томас закрыл глаза, но мысли продолжали прокручиваться: слова Ньюмана, противоречивое поведение Дэна, улыбки на афишах, нервные жесты вживую.",
          "После еды он устроился на узкой койке, обхватив колени руками. Сон накатывал медленно, как волна, и тело наконец позволяло себе расслабиться. В голове складывалась картина Дэна: маршруты, компании, привычки, реакции. Всё это, словно пазл, ждало своей сборки.",
          "Пробудившись через несколько часов, он натянул куртку, собрал бронежилет, маску и перчатки. Томас вернулся к столу: документы Ньюмана, фотографии, скриншоты и записи — всё сливалось в единую карту, где каждое действие Дэна обретало смысл. Проводя пальцем по плану города, он мысленно соединял точки: встречи, маршруты, компании. На афишах — идеальный образ, в жизни — микроскопические дрожания, беглые взгляды, нервные жесты. Контраст был очевиден: город видел героя, Призрак — человека под давлением.",
          "Он повторял правило: не эмоция, только информация. Но память возвращала Джесс — лицо, улыбка, лёгкая боль на губах. Томас сжал кулаки, напоминая себе, что эмоции — лишний груз. Всё, что имеет значение, — факты, слабые места, мотивы.",
          "Мысли складывались в план: «Если Дэн скрывает страх, значит, за ним кто-то стоит. Или что-то». Контракты, деньги, давление сверху — ключевые слова из предыдущей стычки. Томас анализировал допустимые действия, линии, которые нельзя переступать, соблюдение кодекса Призрака:",
          "— Не убивать без причины.",
          "— Не поддаваться эмоциям.",
          "— Всегда собирать информацию перед действием.",
          "— Каждое действие должно иметь цель.",
          "— Чужая жизнь — не игрушка, но инструмент понимания и давления.",
          "Каждое правило резонировало с тем, что он увидел у Дэна. Цель сейчас не разрушить, а понять, поставить в неустойчивое положение, проверить реакцию.",
          "Пальцы скользили по записям, фото на экране освещались тусклым светом. Каждое движение, каждое слово Дэна — данные для стратегии. Томас отметил несколько слабых мест, где будет возможность подтолкнуть человека к раскрытию.",
          "Внутри него холодно: никаких эмоций, только расчёт, наблюдение, цель. И всё же, даже в этом порядке, Джесс шептала тихо в памяти: «Ты не должен был это делать». Но теперь это было напоминанием о том, кем он стал и что выбрал путь Призрака.",
          "Томас сделал глубокий вдох, медленно вернув маску на лицо. В отражении окна мелькнула тень Призрака, готового действовать. План был намечен, стратегия выстроена, кодекс соблюдён. Следующий шаг — второй контакт с Дэном и подготовка улик.",
          "Ночь была мокрой и тяжёлой. Лужи на асфальте отражали тусклые огни фонарей, а запах дождя смешивался с серой и машинным маслом. Томас двигался тихо, почти сливаясь с тенями, наблюдая за пустыми улицами. Каждое движение было аккуратным: шаги, дыхание, взгляд — всё направлено на сбор информации.",
          "Он остановился возле стройплощадки, где ранее видел Дэна с неизвестными мужчинами в дорогих костюмах. Контраст между публичным образом и этими встречами был очевиден. Томас обошёл территорию по периметру, изучая каждый мусорный бак, каждый заброшенный угол. Его пальцы находили пачку чеков, грязную визитку и засохшую пачку документов — мелочи, которые для обычного глаза ничего не значили, но для Призрака — ключи к пониманию игры.",
          "На мгновение он остановился, прислушиваясь к далёкому гудку машин, к шагам случайного прохожего. Никакого риска для себя, только наблюдение и фиксация деталей. Он фотографировал находки на скрытый девайс, записывал координаты и время — каждая деталь складывалась в картину, которая постепенно обнажала правду о Дэне.",
          "В памяти всплывали слова: «Контракт… деньги… давление сверху». Томас связывал их с найденными уликами. Внутри — холодная аналитика: кто давит на Дэна, какие рычаги использовать, чтобы проверить реакцию, где он уязвим. Он знал: нельзя перегнуть палку, нельзя переступать кодекс, но нужно создать напряжение, которое покажет мотивы.",
          "Он задержался у грязного окна стройплощадки, свет фонарей падал на желтую куртку Призрака. Он заметил, как одна из найденных визиток имела логотип компании, связанной с городскими контрактами — тот самый бизнес, который вёл Дэн, скрывая настоящие отношения. Каждое открытие — шаг к плану, к пониманию, кто держит нити за кулисами.",
          "Перед уходом Томас сделал последний обход: проверил путь выхода, оценил звуки, запахи и свет. Всё было аккуратно, профессионально. Его тень растянулась на мокром асфальте, как знак того, что Призрак следит. Внутри — никаких эмоций, только стратегия и подготовка к следующему шагу.",
          "Ночь принимала его как союзника. Улицы шептали информацию, дождь стирал следы, и Томас уходил, оставляя за собой лишь лёгкое колебание воздуха — знак того, что охота продолжается, а Дэн теперь знает: Призрак видит всё.",
          "Томас наблюдал из тени за улицей, где Дэн выходил из своего офиса. Он держался на безопасном расстоянии, но глаза Призрака фиксировали каждое движение. Рядом — плакат с лицом Дэна, рекламирующим новый городской проект, — улыбка на фото идеальна, не тронутая страхом. Но живой Дэн нервно поправлял ворот рубашки, оглядывался по сторонам.",
          "Призрак шагнул вперёд, молча. Его рука сорвала часть афиши с лицом Дэна и бросила на мокрый асфальт. Желтый отпечаток куртки остался на бумаге, едва заметный, но достаточно, чтобы человек, которого ищут, понял: его видят.",
          "Дэн дернулся, взгляд суетливо скользнул по улице. Он не понял, кто это сделал, но тело сжалось, как будто кто-то коснулся невидимой струны страха. Призрак растворился в тенях, оставив после себя лишь холодный дождь и легкое колебание воздуха.",
          "Сообщение было отправлено без слов: «Я знаю. Я наблюдаю. Я здесь». Лишь реакция Дэна, нервные движения, короткий взгляд на улицу — это всё, что нужно.",
          "Томас исчез так же тихо, как пришёл. Внутри — удовлетворение не триумфом, а точностью: цель достигнута, информация получена, сигнал отправлен. Следующий шаг — наращивание давления, изучение реакций, подготовка улик, которые заставят Дэна раскрыться.",
          "Томас вернулся в своё укрытие. Маска снята, но глаза продолжали сканировать тьму — каждый отблеск света, каждую тень. Комната, казалось, сжалась вокруг него, дождь за окном стучал по стеклу, смешиваясь с приглушённым эхом города.",
          "Он сел на край стула, плечи горели от усталости, живот напоминал о пустоте. Но разум не отпускал: реакции Дэна, оставленный сигнал, слабые места — всё складывалось в схему, карту будущих ходов. Сны могли подождать, как и еда — сейчас важнее была цель.",
          "И вдруг тихий голос, словно дыхание памяти:",
          "<span class=\"dialog\">— Ты обещал, что не станешь таким…</span>",
          "Сердце сжалось. Томас закрыл глаза, и перед внутренним взором всплыло лицо Джесс — светлое, с лёгкой болью на губах. Но это уже не просьба. Это маяк, указание пути, который он выбрал.",
          "— Я знаю… — прошептал он, сжимая кулаки. — Я выбрал путь Призрака.",
          "Джесс больше не могла его остановить. В её шёпоте теперь звучало принятие, тихая грусть, а не упрёк. Томас вдохнул глубоко, позволяя холодной решимости заполнить грудь. Внутри него остался лишь стержень цели, острый, как лезвие.",
          "Он взглянул на город через мокрое окно, на его размытые огни. «Начать с мелкой сошки, чтобы добраться до вершины айсберга», — мысленно произнёс он. Каждый шаг, каждое действие — крестовый поход Призрака. Он не просто собирал доказательства, не просто наблюдал — он создавал сеть, которая вскроет систему, разложит её на части и покажет, кто за всем стоит.",
          "Томас медленно вернул маску на лицо. В отражении стекла мелькнула тень Призрака: готового идти сквозь тьму, готового к охоте, готового вынести справедливость на вершину города. Дождь барабанил по стеклу, но теперь это был не фон тревоги — это был ритм его будущих действий.",
          "Он выдохнул, ощущая, как холодная решимость растворяет остатки боли. Путь выбран. Цель ясна. Призрак идёт дальше, к тем, кто находится на вершине, и мелкие игроки — лишь первые фигуры в шахматной партии, которую он начнёт, чтобы вынести правду наружу."
        ].join('\n\n')
      }
    ];

    let currentChapterIndex = 0;

    function showChapter(index) {
      if (index < 0 || index >= chapters.length) return;

      currentChapterIndex = index;

      const chapter = chapters[index];

      document.getElementById('chapter-title').textContent = chapter.title;

      let formattedText = chapter.text
        .trim()
        .replace(/\n\n+/g, '</p><p>')
        .replace(/\n/g, '<br>');

      if (!formattedText.startsWith('<p>')) {
        formattedText = '<p>' + formattedText + '</p>';
      }

      // Плавный fade
      const textContainer = document.getElementById('chapter-text');
      textContainer.style.opacity = '0';
      setTimeout(() => {
        textContainer.innerHTML = formattedText;
        textContainer.style.opacity = '1';
      }, 200);

      // Обновляем индикатор
      document.getElementById('current-chapter-info').textContent = 
        `Глава ${index + 1} из ${chapters.length}`;

      // Подсветка активной кнопки в списке
      document.querySelectorAll('.chapter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (parseInt(btn.dataset.index) === index) {
          btn.classList.add('active');
        }
      });

      // Отключение кнопок prev/next на краях
      document.getElementById('prev-chapter').disabled = index === 0;
      document.getElementById('next-chapter').disabled = index === chapters.length - 1;
    }

    // Показываем первую главу
    showChapter(currentChapterIndex);

    // Переключение темы
    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    });

    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
    }

    // Кнопки prev/next
    document.getElementById('prev-chapter').addEventListener('click', () => {
      showChapter(currentChapterIndex - 1);
    });

    document.getElementById('next-chapter').addEventListener('click', () => {
      showChapter(currentChapterIndex + 1);
    });

    // Генерируем список глав
    const chaptersContainer = document.getElementById('chapters-container');
    chapters.forEach((ch, index) => {
      const btn = document.createElement('button');
      btn.className = 'chapter-btn';
      btn.textContent = ch.title;
      btn.dataset.index = index;
      btn.onclick = () => showChapter(index);
      chaptersContainer.appendChild(btn);
    });

    // Подсвечиваем первую главу при загрузке
    document.querySelector('.chapter-btn[data-index="0"]').classList.add('active');
   // Кнопка "Случайная глава"
    document.getElementById('random-chapter').addEventListener('click', () => {
    // Генерируем случайный индекс от 0 до chapters.length - 1
    const randomIndex = Math.floor(Math.random() * chapters.length);
    // Показываем случайную главу
    showChapter(randomIndex);
    });
  </script>
</body>
</html>
