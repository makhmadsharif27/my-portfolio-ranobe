  .ghost-title {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 20px 0 10px;
  font-size: 3.5rem;
  font-weight: 900;

}

.ghost-title::before {
  content: "Желтый Призрак";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  color: rgba(255, 215, 0, 0.12);

  z-index: -1;

}

.symbol {

}

@keyframes glow {
  from { text-shadow: 0 0 15px #ffd700, 0 0 30px #ff9900; }
  to   { text-shadow: 0 0 30px #ffd700, 0 0 60px #ff3300, 0 0 80px #ff0000; }
}

@keyframes drift {
  0%   { transform: translate(0, 0) scale(1); }
  50%  { transform: translate(25px, -15px) scale(1.1); }
  100% { transform: translate(0, 0) scale(1); }
}

@keyframes pulse {
  0%, 100% { opacity: 0.8; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.15); }
}

      {

        text: `Утро. Прозвенел будильник. Он напоминал, что на часах уже 7.00 и пора вставать.

В дверях появилась Джесс — младшая сестра с лёгкой улыбкой и озорной искрой в глазах. Ласковым голосом она сказала:
— Томми, братишка, просыпайся! Пора вставать, не забудь — сегодня у тебя уйма дел.

Томас приподнялся на локтях, потянулся, чувствуя привычную тяжесть в плечах. Его взгляд скользнул по комнате: разбросанные карты, тетради с пометками и мелкие заметки на стенах, где он отмечал улицы, переулки и скрытые тропы. Всё это казалось хаотичным, но для него — карта мира, который он понимал лучше других.

— Уже встаю, — пробормотал он. Голос тихий, с долей утренней сонливости.

Джесс усмехнулась и шлёпнула его по плечу. Томас встал, потянулся и подошёл к столу. Там лежали его карты города, аккуратно разложенные, с множеством пометок, линий и маленьких крестиков на пересечениях переулков. Он провёл пальцем по одной из троп, словно проверяя маршрут, который сам же и выстраивал.

— Сегодня придётся пройтись по этим улицам, — пробормотал он себе под нос.

Карты были не просто хобби — это был способ понимать город, видеть то, что скрыто от глаз обычных людей. Каждая улица, каждый переулок, каждая «слепая зона» имела для него значение. Он думал о тех местах, где свет никогда не добирался, о заброшенных двориках, где жизнь, казалось, остановилась.

Джесс наблюдала за ним с лёгким удивлением.

— Ты опять будешь рисовать свои карты весь день? — спросила она, улыбаясь.

— И наблюдать. Всё как обычно, — тихо ответил Томас, не отводя взгляда от линий на бумаге.

Он слегка нахмурился, когда взгляд зацепился за маленький крестик на одной из карт — место, где недавно произошло что‑то странное, что город предпочёл забыть. Там, в тишине и тени, пряталась правда, которую никто не хотел видеть. Джесс заметила его выражение и слегка нахмурилась:

— Томми, опять думаешь о каких‑то странных местах? — спросила она.

Он лишь кивнул, не желая объяснять.

Иногда город говорил с ним сам, и в эти разговоры никто, кроме него, не был допущен. В памяти всплывали ночи, когда он впервые скрылся среди улиц, наблюдая за тенями и фонарями, пытаясь понять город, который жил своей собственной жизнью, независимо от людей. Томас ощущал себя частью города, словно улицы знали его, и он — их секрет.

Они с Джесс мило поболтали за завтраком. Уютная атмосфера, и ничто не указывало на то, что грядёт неизбежно. После Томас надел куртку, закинул рюкзак с картами на плечо и вышел в прохладное утро. Город ещё просыпался: где‑то скрипели двери магазинов, раздавался редкий стук колёс по мостовой, вдали громыхали трамваи. Томас глубоко вдохнул запах мокрого асфальта и старых кирпичных стен — для него это было словно дышать самим городом.

Томас родился и вырос в этом городе. Всегда был наблюдательным и любознательным, что делало его немного замкнутым, но невероятно внимательным к деталям. Сейчас ему 24, он учится на урбаниста — профессия идеально отвечала его любви к картам и тайным тропам города. Днём он работал в небольшой архитектурной фирме, помогая с планами и схемами, а вечером снова погружался в свои карты и заметки о слепых зонах.

Его лучший друг Дэн был полной противоположностью: шумный, харизматичный, любил приключения и часто пытался втянуть Тома в обычные городские развлечения, но почти всегда безуспешно. Несмотря на разницу характеров, они понимали друг друга с полуслова и доверяли друг другу больше, чем кому‑либо ещё. Томас ценил Дэна как мост между миром обычных людей и его собственным, полным карт, маршрутов и тайн. Но иногда он чувствовал, что Дэн скрывает нечто, — и это чувство тревоги он не мог отпустить.

Он шагал привычными тропами не спеша, но внимательно. Каждое движение людей, каждая вывеска, каждый прохожий попадали в его внимание. Томас отмечал детали, которые большинство игнорировало: трещину на старой стене, переломанный фонарь на углу, силуэт, быстро скрывшийся за поворотом. Каждое движение города для него было подсказкой, намёком на то, что произойдёт дальше.

Он снова посмотрел на свои карты, на слепые зоны, которые тщательно помечал. Сегодня он планировал пройти по одной из таких улиц — узкой, почти забытой улочке, где город казался чужим и опасным. В этих тихих переулках он чувствовал себя дома, хотя для обычных людей это были лишь заброшенные тропы.

Когда Томас свернул за угол, он увидел Дэна у старого киоска с газетами.

— Эй, Томми! — позвал Дэн, размахивая рукой. — Ты опять идёшь по своим «тайным тропам»?

— Иду. Сегодня проверю одну из слепых зон, — спокойно ответил Томас.

— Хм… ну, ладно, — Дэн пожал плечами. — Я тебя предупреждал, что это место выглядит странно.

Дружба между ними была проста: Томас выбирал осторожность и внимание к деталям, а Дэн — движение и спонтанность. Но Томас ощущал лёгкую тревогу — даже Дэн, такой открытый и уверенный, иногда носил тень чего‑то скрытого.

Они шли по мостовой. Томас отмечал новые линии на своей карте, а Дэн рассказывал истории о случайных встречах и странных звуках. Томас тихо слушал, но в голове формировал планы маршрута. Он мысленно прокладывал каждый шаг, вычисляя опасности, которые могли подстерегать в каждом переулке.

Проходя мимо узкого переулка, Томас почувствовал лёгкое напряжение в воздухе, словно город сам предостерегал его. Тонкие намёки в деталях — тень, едва заметное движение, странный отблеск — создавали ощущение, что что‑то изменится. Его сердце билось быстрее, но разум оставался холодным, как всегда.

— Томми… — едва слышно произнёс Дэн.

С верхнего этажа старой фабрики раздался резкий звук — стекло треснуло, и обломки рухнули вниз. Томас заметил Джесс: её силуэт мелькнул на мгновение в дыму, затем… тишина.

Он бросился к ней, но было слишком поздно. Её тело неподвижно лежало среди обломков. Мир Тома рушился, как будто из него вырвали кусок души. Он поднял глаза и увидел Дэна, стоящего в стороне. Его взгляд был странным, холодным, чужим. Томас ощутил предательство, острое и внезапное, которое разрывало сердце. В голове мелькнули сомнения, вопросы о доверии, которые раньше никогда не возникали.

Он опустился на колени рядом с Джесс, и внутри что‑то ломалось и формировалось одновременно. Боль, отчаяние, гнев — всё это перемешалось в сознании. Он слышал каждый стук сердца, каждый шёпот ветра. Мир вокруг словно замер, оставляя лишь пустоту и жёлтый свет внутри него.

Внезапно тьма переулка словно ожила. Томас почувствовал холодный ветер, а на мокрой мостовой отражался жёлтый отблеск, будто город сам показывал ему путь. Этот свет был внутренним, рождённым из горечи и решимости. Он вспомнил каждый момент потери, каждую несправедливость, которую город когда‑либо скрывал.

Он встал, сжав кулаки, и взгляд стал холодным, как лёд. Внутренний огонь жажды мести разгорелся в нём. Томас посмотрел на стену рядом — и его тень начала сливаться с жёлтым светом внутри него, словно сама тьма города принимала его.

И вдруг он понял: старый Томас умер вместе с прошлой жизнью и Джесс. Всё, что было — радость, надежды, простые мечты, доверие к миру — кануло в пустоту. На их месте родился новый: холодный, решительный, движимый единственной целью.

    "Мужчина задыхался, глаза его расширились до предела. Он пытался что-то сказать, слова прилипали к нёбу, выходили ломаными криками. Вдруг он дёрнулся, повернулся к Томасу и прошипел едва слышно:",

    "В этом ускорении был смысл новой игры: не просто месть, а систематичное уничтожение тех, кто стоял за всем этим — за смертью Джесс, за сном, за именем, которое он теперь произносил в голове как молитву и приговор:",

    ];

    let currentChapterIndex = 0;

    function showChapter(index) {
      if (index < 0 || index >= chapters.length) return;

      currentChapterIndex = index;

      const chapter = chapters[index];

      document.getElementById('chapter-title').textContent = chapter.title;

      let formattedText = chapter.text
        .trim()
        .replace(/\n\n+/g, '</p><p>')
        .replace(/\n/g, '<br>');

      if (!formattedText.startsWith('<p>')) {
        formattedText = '<p>' + formattedText + '</p>';
      }

      // Плавный fade
      const textContainer = document.getElementById('chapter-text');
      textContainer.style.opacity = '0';
      setTimeout(() => {
        textContainer.innerHTML = formattedText;
        textContainer.style.opacity = '1';
      }, 200);

      // Обновляем индикатор
      document.getElementById('current-chapter-info').textContent = 
        `Глава ${index + 1} из ${chapters.length}`;

      // Подсветка активной кнопки в списке
      document.querySelectorAll('.chapter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (parseInt(btn.dataset.index) === index) {
          btn.classList.add('active');
        }
      });

      // Отключение кнопок prev/next на краях
      document.getElementById('prev-chapter').disabled = index === 0;
      document.getElementById('next-chapter').disabled = index === chapters.length - 1;
    }

    // Показываем первую главу
    showChapter(currentChapterIndex);

    // Переключение темы
    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    });

    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
    }

    // Кнопки prev/next
    document.getElementById('prev-chapter').addEventListener('click', () => {
      showChapter(currentChapterIndex - 1);
    });

    document.getElementById('next-chapter').addEventListener('click', () => {
      showChapter(currentChapterIndex + 1);
    });

    // Генерируем список глав
    const chaptersContainer = document.getElementById('chapters-container');
    chapters.forEach((ch, index) => {
      const btn = document.createElement('button');
      btn.className = 'chapter-btn';
      btn.textContent = ch.title;
      btn.dataset.index = index;
      btn.onclick = () => showChapter(index);
      chaptersContainer.appendChild(btn);
    });

    // Подсвечиваем первую главу при загрузке
    document.querySelector('.chapter-btn[data-index="0"]').classList.add('active');
   // Кнопка "Случайная глава"
    document.getElementById('random-chapter').addEventListener('click', () => {
    // Генерируем случайный индекс от 0 до chapters.length - 1
    const randomIndex = Math.floor(Math.random() * chapters.length);
    // Показываем случайную главу
    showChapter(randomIndex);
    });

    // Показываем кнопку "Наверх" при прокрутке
window.addEventListener('scroll', () => {
  document.getElementById('scroll-top').style.display = 
    window.scrollY > 400 ? 'block' : 'none';
});

// Прокрутка наверх плавно
document.getElementById('scroll-top').addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
  </script>
